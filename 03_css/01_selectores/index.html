<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Referencia tipo 1: Por clave*/
        p{ color: red}
        /* Referencia tipo 2: Por atributo Id*/
        #elemento1{ color: green}
        /* Referencia tipo 3: Por atributo class */
        .tamanio20{ font-size: 20px; }
    </style>
</head>
<body>
    <p class="tamanio20">Hola, soy Carlos</p>
    <p>Hola, soy Maria</p>
    <p class="tamanio20">Hola, soy Pedro</p>
    <p id="elemento1">Hola, soy Carla</p>
    <h1>Este es un titulo</h1>
</body>
</html>
