<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedades de CSS</title>
    <style>
        /*div{ width:100px; height: 100px; border-width: 2px; border-style: solid; border-color: #FF0000}*/
        div{ width:100px; height: 100px;}
        .c0{ border-style: dotted; border-color: #00FF00;}
        .c1{ border-style:dashed}
        .c2{border-style:solid; border-color: #FF0000; border-width: 1px;}
        .c3{border-style:double; border-width: thin;}
        .c4{border-style: groove; border-width:medium}
        .c5{border-style:ridge; border-width: 3px}
        .c6{border-style:inset; border-width: 3px;}
        .c7{border-style:outset; border-width: 3px;}
        .c8{border-style:none}
        .c9{border-style: hidden;}
        .c10{
            background: #FF0000; 
            text-align: center; 
            color:#FFF;
            /*border-radius: 50%;*/
            border-width: 2px;
            border-style: solid;
            /*padding: TOP RIGHT BOTTOM LEFT;*/
            padding: 10px 12px;
            /*margin:5px;*/
            box-sizing: border-box;
            /* Alto de caja : 124 px*/
        }
        .c11{ background: #00FF00; box-sizing: border-box;}
    </style>
</head>
<body>
    <h1>Tipos de borde en cajas</h1>
    <div class="c0">0</div>
    <div class="c1">1</div>
    <div class="c2">2</div>
    <div class="c3">3</div>
    <div class="c4">4</div>
    <div class="c5">5</div>
    <div class="c6">6</div>
    <div class="c7">7</div>
    <div class="c8">8</div>
    <div class="c9">9</div>
    <div class="c10">10</div>
    <div class="c11">11</div>
    <div>12</div>
</body>
</html>
