<html>
    <head></head>
    <body>
        <h1>Ejemplo de etiquetas HTML</h1>
        <p>Este archivo muestra un ejemplo usando las etiquetas html básicas</p>
        <hr>
        <h2>Formulario de registro</h2>
        <form method="post" action="">
            <fieldset>
                <legend>Datos del Usuario</legend>
                <p>
                    <label for="txtNombre">Nombre:</label>
                    <input type="text" id="txtNombre" name="nombre" placeholder="Escribe tu nombre"/>
                </p>

                <p>
                    <label for="curso">Curso favorito:</label>
                    <select id="curso" name="curso">
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="php">PHP</option>
                    </select>
                </p>

                <p>
                    <label for="comentarios">Comentarios:</label>
                    <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="Escribe tus comentarios..."></textarea>
                </p>
            </fieldset>
        </form>

        <h2>Lista de Objetivos</h2>
        <ul>
            <li>Practicar etiquetas básicas</li>
            <li>Comprender la estructura de un formulario</li>
            <li>Usar listas pra organizar información</li>
        </ul>
    </body>
</html>
